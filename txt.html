<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Default Examples</title>
		<style>
			form {
				margin: 0;
			}
			textarea {
				display: block;
			}
		</style>
		<link rel="stylesheet" href="css/txt-1-r.css">
		<script charset="utf-8" src="js/raminxz-1-min.js"></script>
		<script charset="utf-8" src="js/zh-CN.js"></script>
<script>
			var editor;
			KindEditor.ready(function(K) {
				editor = K.create('textarea[name="content"]', {
					allowFileManager : true
				});
				K('input[name=getHtml]').click(function(e) {
					alert(editor.html());
				});
				K('input[name=isEmpty]').click(function(e) {
					alert(editor.isEmpty());
				});
				K('input[name=getText]').click(function(e) {
					alert(editor.text());
				});
				K('input[name=selectedHtml]').click(function(e) {
					alert(editor.selectedHtml());
				});
				K('input[name=setHtml]').click(function(e) {
					editor.html('<h3>Hello KindEditor</h3>');
				});
				K('input[name=setText]').click(function(e) {
					editor.text('<h3>Hello KindEditor</h3>');
				});
				K('input[name=insertHtml]').click(function(e) {
					editor.insertHtml('<strong>插入HTML</strong>');
				});
				K('input[name=appendHtml]').click(function(e) {
					editor.appendHtml('<strong>添加HTML</strong>');
				});
				K('input[name=clear]').click(function(e) {
					editor.html('');
				});
			});
		</script>
	</head>
	<body>
		<script type="text/javascript"><!--
		google_ad_client = "ca-pub-7116729301372758";
		/* 更多演示（728x90） */
		google_ad_slot = "5052271949";
		google_ad_width = 728;
		google_ad_height = 90;
		//-->
		</script>
		<script type="text/javascript" src="http://pagead2.googlesyndication.com/pagead/show_ads.js">
		</script>
		<h3>text - Editor - <b>raminxz</b></h3>
		<form>
			<textarea name="content" style="width:800px;height:400px;visibility:hidden;">text - Editor</textarea>
			<p>
				<input type="button" name="getHtml" value="دریافت html" />
				<input type="button" name="getText" value="دریافت متن" />
				<input type="button" name="selectedHtml" value="انتخاب html" />
				<br />
				<br />
				<input type="button" name="setHtml" value="setHtml" />
				<input type="button" name="setText" value="setText" />
				<input type="button" name="insertHtml" value="insertHtml" />
				<input type="button" name="appendHtml" value="appendHtml" />
				<input type="button" name="clear" value="پاک کردن همه" />
<!-- 				<input type="button" name="isEmpty" value="判断是否为空" /> -->
				<input type="reset" name="reset" value="ریست" />
			</p>
		</form>
	</body>
</html>
